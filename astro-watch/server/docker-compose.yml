version: '3.8'

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: astrowatch-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astrowatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-astrowatch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astrowatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Ollama for embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: astrowatch-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    # GPU support (uncomment for NVIDIA GPUs)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # FastAPI embedding server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrowatch-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-astrowatch}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-astrowatch}
      OLLAMA_HOST: http://ollama:11434
      API_TOKEN: ${API_TOKEN:?API_TOKEN must be set}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:

networks:
  default:
    name: astrowatch-network
